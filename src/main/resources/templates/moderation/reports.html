<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Admin - Content Moderation</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-10"> <div class="card shadow-sm">
            <div class="card-header bg-dark text-white d-flex justify-content-between align-items-center">
                <h4 class="mb-0">Content Moderation - Pending Reports</h4>
                <span class="badge bg-warning text-dark fw-bold" th:text="${reports.size() + ' Pending'}">0 Pending</span>
            </div>
            <div class="card-body p-0"> <div class="table-responsive">
                <table class="table table-hover table-striped mb-0 align-middle">
                    <thead class="table-light">
                    <tr>
                        <th class="ps-4" style="width: 10%">Report ID</th>
                        <th style="width: 35%">Reason for Violation</th>
                        <th style="width: 30%">Target Post</th>
                        <th class="pe-4 text-end" style="width: 25%">Actions</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:if="${#lists.isEmpty(reports)}">
                        <td colspan="4" class="text-center py-4 text-muted">
                            No pending reports found. The system is clean!
                        </td>
                    </tr>

                    <tr th:each="report : ${reports}">
                        <td class="ps-4 fw-bold text-secondary" th:text="${'#' + report.id}">#1</td>
                        <td>
                            <div class="d-flex align-items-center">
                                <span class="badge bg-danger me-2">Reported</span>
                                <span th:text="${report.reason}" class="text-wrap">Reason text here</span>
                            </div>
                        </td>
                        <td>
                            <div th:if="${report.post != null}">
                                <a th:href="@{/posts/{id}(id=${report.post.id})}" target="_blank" class="text-decoration-none fw-semibold text-primary" th:text="${report.post.title}">
                                    Sample Post Title
                                </a>
                            </div>
                            <span th:if="${report.post == null}" class="text-muted small">N/A</span>
                        </td>
                        <td class="pe-4 text-end">
                            <div class="d-flex justify-content-end gap-2">
                                <form th:action="@{/moderation/reports/{id}/resolve(id=${report.id})}" method="post" class="m-0">
                                    <input type="hidden" name="moderatorId" value="1"/> <button type="submit" class="btn btn-sm btn-danger px-3 shadow-sm">
                                    Resolve & Hide
                                </button>
                                </form>

                                <form th:if="${report.post != null}" th:action="@{/moderation/posts/{id}/pin(id=${report.post.id})}" method="post" class="m-0">
                                    <button type="submit"
                                            th:class="${report.post.isPinned} ? 'btn btn-sm btn-secondary px-3 shadow-sm' : 'btn btn-sm btn-outline-success px-3 shadow-sm'"
                                            th:text="${report.post.isPinned} ? 'Unpin' : 'Pin Post'">
                                        Pin Post
                                    </button>
                                </form>
                            </div>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>

            </div>
            <div class="card-footer bg-light d-flex justify-content-start py-3">
                <a th:href="@{/admin/topics}" class="btn btn-sm btn-secondary">
                    &larr; Back to Topic Management
                </a>
            </div>
        </div>
        </div>
    </div>
</div>
</body>
</html>
