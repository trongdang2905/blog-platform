<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Report Detail</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
        rel="stylesheet">

  <style>
    body {
      background: #f5f7fb;
    }

    .sidebar {
      min-height: 100vh;
      background: #212529;
    }

    .sidebar .nav-link {
      color: #ced4da;
      padding: 14px 20px;
      margin: 5px 10px;
      border-radius: 8px;
      transition: .2s;
    }

    .sidebar .nav-link:hover {
      background: #343a40;
      color: white;
    }

    .sidebar .active {
      background: #0d6efd;
      color: white;
    }

    .info-title {
      font-weight: 600;
      color: #6c757d;
    }

    .content-box {
      white-space: pre-wrap;
      background: #f8f9fa;
      border-radius: 8px;
      padding: 15px;
    }
  </style>

</head>

<body>

<div th:replace="~{fragments/nav :: nav}"></div>

<div class="container-fluid">

  <div class="row">

    <!-- Sidebar -->
    <div class="col-md-2 sidebar p-0">

      <div class="text-center text-white py-4 border-bottom">
        <h3>Moderator</h3>
      </div>

      <a th:href="@{/moderation/dashboard}" class="nav-link">
        🏠 Dashboard
      </a>

      <a th:href="@{/moderation/reports}" class="nav-link active">
        🚨 Reported Posts
      </a>

      <a th:href="@{/moderation/posts}" class="nav-link">
        📌 Post List
      </a>

    </div>

    <!-- Main -->
    <div class="col-md-10">

      <div class="p-4">

        <h2 class="mb-4">
          Report Detail
        </h2>

        <div class="card shadow">

          <div class="card-header bg-dark text-white">
            Report #<span th:text="${report.id}"></span>
          </div>

          <div class="card-body">

            <div class="row mb-3">

              <div class="col-md-3 info-title">
                Reporter
              </div>

              <div class="col-md-9"
                   th:text="${report.reporter.username}">
              </div>

            </div>

            <div class="row mb-3">

              <div class="col-md-3 info-title">
                Report Time
              </div>

              <div class="col-md-9"
                   th:text="${#temporals.format(report.createdAt,'dd/MM/yyyy HH:mm')}">
              </div>

            </div>

            <div class="row mb-3">

              <div class="col-md-3 info-title">
                Status
              </div>

              <div class="col-md-9">

                                <span class="badge bg-warning"
                                      th:text="${report.statusReport}">
                                </span>

              </div>

            </div>

            <hr>

            <div th:if="${report.post!=null}">

              <div class="row mb-3">

                <div class="col-md-3 info-title">
                  Post Title
                </div>

                <div class="col-md-9 fw-bold"
                     th:text="${report.post.title}">
                </div>

              </div>

              <div class="row mb-3">

                <div class="col-md-3 info-title">
                  Author
                </div>

                <div class="col-md-9"
                     th:text="${report.post.user.username}">
                </div>

              </div>

              <div class="row mb-3">

                <div class="col-md-3 info-title">
                  Topic
                </div>

                <div class="col-md-9"
                     th:text="${report.post.topic.name}">
                </div>

              </div>

              <div class="row mb-3">

                <div class="col-md-3 info-title">
                  Post Status
                </div>

                <div class="col-md-9">

                                    <span class="badge bg-primary"
                                          th:text="${report.post.statusPost}">
                                    </span>

                </div>

              </div>

              <div class="row mb-3">

                <div class="col-md-3 info-title">
                  Content
                </div>

                <div class="col-md-9">

                  <div class="content-box"
                       th:text="${report.post.content}">
                  </div>

                </div>

              </div>

            </div>

            <hr>

            <div class="row mb-4">

              <div class="col-md-3 info-title">
                Report Reason
              </div>

              <div class="col-md-9">

                <div class="content-box"
                     th:text="${report.reason}">
                </div>

              </div>

            </div>

            <div class="d-flex gap-2">

              <form th:if="${report.post!=null}"
                    th:action="@{/moderation/reports/{id}/resolve(id=${report.id})}"
                    method="post">

                <button class="btn btn-danger">
                  Hide Post
                </button>

              </form>

              <a th:href="@{/moderation/reports}"
                 class="btn btn-secondary">

                Back

              </a>

            </div>

          </div>

        </div>

      </div>

    </div>

  </div>

</div>

</body>
</html>
