<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Admin - Manage Topics</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <style>
        .btn-theme-primary {
            background-color: #7c3aed;
            border-color: #7c3aed;
            color: #fff;
        }
        .btn-theme-primary:hover {
            background-color: #6b2fd6;
            border-color: #6b2fd6;
            color: #fff;
        }
        .table-theme-header {
            background-color: #1e1b2e !important;
            color: #ffffff !important;
        }
        /* Style cho nút Phân trang */
        .page-item.active .page-link {
            background-color: #7c3aed !important;
            border-color: #7c3aed !important;
            color: #fff !important;
        }
        .page-link {
            color: #1e1b2e;
        }
    </style>
</head>
<body class="bg-light">

<div th:replace="~{fragments/nav :: nav}"></div>

<div class="container mt-5">
    <!-- Header Layout -->
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="fw-bold" style="color: #1e1b2e;">Topic Management</h2>
        <div>
            <a th:href="@{/admin/topics/create}" class="btn btn-theme-primary shadow-sm">
                <i class="bi bi-plus-circle me-1"></i> Add New Topic
            </a>
        </div>
    </div>

    <!-- Search Form -->
    <form th:action="@{/admin/topics}" method="get" class="row g-3 mb-4">
        <div class="col-md-10">
            <div class="input-group shadow-sm">
                <span class="input-group-text bg-white"><i class="bi bi-search text-muted"></i></span>
                <input type="text" name="search" th:value="${param.search}" class="form-control" placeholder="Search by topic name or description...">
            </div>
        </div>
        <div class="col-md-2">
            <button type="submit" class="btn btn-theme-primary w-100 shadow-sm">
                <i class="bi bi-funnel-fill me-1"></i> Filter
            </button>
        </div>
    </form>

    <!-- Data Table -->
    <div class="card shadow-sm border-0 mb-4">
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-striped table-hover align-middle mb-0">
                    <thead>
                    <tr class="table-theme-header">
                        <th style="width: 8%;" class="ps-3 py-3">ID</th>
                        <th style="width: 20%;" class="py-3">Name</th>
                        <th style="width: 20%;" class="py-3">Slug</th>
                        <th class="py-3">Description</th>
                        <th style="width: 12%;" class="text-center py-3">Status</th>
                        <th style="width: 10%;" class="text-center py-3">Order</th>
                        <th style="width: 15%;" class="text-center py-3">Actions</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="topic : ${topics}">
                        <td class="fw-bold ps-3" th:text="${topic.id}">1</td>
                        <td th:text="${topic.name}" class="fw-bold">Java</td>
                        <td th:text="${topic.slug}">java</td>
                        <td th:text="${topic.description}">Java Web Development</td>
                        <td class="text-center">
                            <span th:if="${topic.isActive}" class="badge bg-success">Active</span>
                            <span th:unless="${topic.isActive}" class="badge bg-danger">Inactive</span>
                        </td>
                        <td class="text-center" th:text="${topic.displayOrder}">1</td>
                        <td class="text-center">
                            <div class="d-flex justify-content-center gap-2">
                                <a th:href="@{/admin/topics/edit/{id}(id=${topic.id})}" class="btn btn-sm btn-outline-warning d-inline-flex align-items-center" title="Edit">
                                    <i class="bi bi-pencil-square me-1"></i> Edit
                                </a>
                                <a th:href="@{/admin/topics/delete/{id}(id=${topic.id})}"
                                   class="btn btn-sm btn-outline-danger d-inline-flex align-items-center"
                                   title="Delete"
                                   onclick="return confirm('Are you sure you want to delete this topic?')">
                                    <i class="bi bi-trash-fill me-1"></i> Delete
                                </a>
                            </div>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(topics)}">
                        <td colspan="7" class="text-center text-muted py-4">No topics found.</td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Thanh Phân Trang (Pagination) -->
    <div th:if="${totalPages > 0}" class="d-flex justify-content-center pb-5">
        <nav>
            <ul class="pagination mb-0">
                <!-- Nút Previous -->
                <li class="page-item" th:classappend="${currentPage == 0} ? 'disabled'">
                    <a class="page-link" th:href="@{/admin/topics(page=${currentPage - 1}, search=${param.search})}">Previous</a>
                </li>

                <!-- Danh sách các số trang 1, 2, 3... -->
                <li class="page-item"
                    th:each="i : ${#numbers.sequence(0, totalPages - 1)}"
                    th:classappend="${i == currentPage} ? 'active'">
                    <a class="page-link"
                       th:href="@{/admin/topics(page=${i}, search=${param.search})}"
                       th:text="${i + 1}">1</a>
                </li>

                <!-- Nút Next -->
                <li class="page-item" th:classappend="${currentPage + 1 == totalPages} ? 'disabled'">
                    <a class="page-link" th:href="@{/admin/topics(page=${currentPage + 1}, search=${param.search})}">Next</a>
                </li>
            </ul>
        </nav>
    </div>

</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
