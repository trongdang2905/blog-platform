<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Admin - Manage Users</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
</head>
<body class="bg-light">
<div class="container mt-5">
    <!-- Header with balanced double buttons layout -->
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="text-dark fw-bold">User Management</h2>
        <div class="d-flex gap-2">
            <a th:href="@{/admin/topics}" class="btn btn-outline-primary">
                <i class="bi bi-tags-fill me-1"></i> Manage Topics
            </a>
            <!-- Disabled button to maintain perfect visual balance without throwing 404 errors -->
            <button class="btn btn-primary disabled" title="Users must register via UC1 Signup">
                <i class="bi bi-person-plus-fill me-1"></i> Add New User
            </button>
        </div>
    </div>

    <!-- Filter and Search Bar -->
    <form th:action="@{/admin/users}" method="get" class="row g-3 mb-4">
        <div class="col-md-6">
            <div class="input-group shadow-sm">
                <span class="input-group-text bg-white"><i class="bi bi-search text-muted"></i></span>
                <input type="text" name="search" th:value="${param.search}" class="form-control" placeholder="Search by username or email...">
            </div>
        </div>
        <div class="col-md-4">
            <select name="status" class="form-select shadow-sm">
                <option value="">-- All Statuses --</option>
                <option value="ACTIVE" th:selected="${param.status != null && param.status[0] == 'ACTIVE'}">ACTIVE</option>
                <option value="BANNED" th:selected="${param.status != null && param.status[0] == 'BANNED'}">BANNED</option>
            </select>
        </div>
        <div class="col-md-2">
            <button type="submit" class="btn btn-primary w-100 shadow-sm"><i class="bi bi-funnel-fill me-1"></i>Filter</button>
        </div>
    </form>

    <!-- Minimalist Data Table -->
    <div class="card shadow-sm border-0">
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-striped table-hover align-middle mb-0">
                    <thead class="table-dark">
                    <tr>
                        <th style="width: 8%;" class="ps-3">ID</th>
                        <th>Username</th>
                        <th>Email</th>
                        <th style="width: 25%;">Role</th>
                        <th style="width: 15%;" class="text-center">Status</th>
                        <th style="width: 15%;" class="text-center">Actions</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="user : ${users}">
                        <td class="fw-bold ps-3" th:text="${user.id}">1</td>
                        <td th:text="${user.username}">username</td>
                        <td th:text="${user.email}">email@example.com</td>
                        <td>
                            <form th:action="@{/admin/users/update-role/{id}(id=${user.id})}" method="post" class="d-flex align-items-center">
                                <select name="role" class="form-select form-select-sm me-2" style="width: 130px;">
                                    <option value="MEMBER" th:selected="${user.role.name() == 'MEMBER'}">MEMBER</option>
                                    <option value="MODERATOR" th:selected="${user.role.name() == 'MODERATOR'}">MODERATOR</option>
                                    <option value="ADMIN" th:selected="${user.role.name() == 'ADMIN'}">ADMIN</option>
                                </select>
                                <button type="submit" class="btn btn-sm btn-outline-success" title="Save Role">
                                    <i class="bi bi-check-lg"></i> Save
                                </button>
                            </form>
                        </td>
                        <td class="text-center">
                            <span th:if="${user.statusUser.name() == 'ACTIVE'}" class="badge bg-success">ACTIVE</span>
                            <span th:if="${user.statusUser.name() == 'BANNED'}" class="badge bg-danger">BANNED</span>
                        </td>
                        <td class="text-center">
                            <form th:action="@{/admin/users/toggle-status/{id}(id=${user.id})}" method="post">
                                <button th:if="${user.statusUser.name() == 'ACTIVE'}" type="submit" class="btn btn-sm btn-outline-danger w-75">
                                    <i class="bi bi-lock-fill me-1"></i> Ban
                                </button>
                                <button th:if="${user.statusUser.name() == 'BANNED'}" type="submit" class="btn btn-sm btn-outline-success w-75">
                                    <i class="bi bi-unlock-fill me-1"></i> Unban
                                </button>
                            </form>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(users)}">
                        <td colspan="6" class="text-center text-muted py-4">No users found.</td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
