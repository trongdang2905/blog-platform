<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Register</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>

<body>

<section class="vh-100 bg-image"
         style="
            background-image: url('/image/login.png');
            background-repeat: no-repeat;
            background-position: center;
            background-size: cover;

         ">

    <div class="mask d-flex align-items-center h-100"
         style="background: rgba(255,255,255,0.2);">

        <div class="container h-100">

            <div class="row d-flex justify-content-center align-items-center h-100">

                <div class="col-md-6 col-lg-5">

                    <div class="card shadow-lg" style="border-radius:15px;">

                        <div class="card-body p-5">

                            <h2 class="text-center mb-4 fw-bold">BLOG PLATFORM</h2>

                            <h5 class="text-center text-muted mb-4">
                                Create an Account
                            </h5>

                            <p class="text-danger text-center"
                               th:if="${errorMessage != null}"
                               th:text="${errorMessage}">
                            </p>

                            <form th:action="@{/auth/register}" th:object="${userRegisterRequest}" method="post">

                                <!-- Username -->
                                <div class="mb-3">
                                    <label class="form-label fw-bold">Fullname</label>

                                    <input type="text"
                                           class="form-control"
                                           th:field="*{username}"
                                           th:errorclass="is-invalid"
                                           placeholder="Enter fullname">

                                    <div class="text-danger mt-1"
                                         th:if="${#fields.hasErrors('username')}"
                                         th:errors="*{username}">
                                    </div>
                                </div>

                                <!-- Email -->
                                <div class="mb-3">
                                    <label class="form-label fw-bold">Email</label>

                                    <input type="email"
                                           class="form-control"
                                           th:field="*{email}"
                                           th:errorclass="is-invalid"
                                           placeholder="name@example.com">

                                    <div class="text-danger mt-1"
                                         th:if="${#fields.hasErrors('email')}"
                                         th:errors="*{email}">
                                    </div>
                                </div>

                                <!-- Password -->
                                <div class="mb-4">
                                    <label class="form-label fw-bold">Password</label>

                                    <input type="password"
                                           class="form-control"
                                           th:field="*{password}"
                                           th:errorclass="is-invalid"
                                           placeholder="Enter password">

                                    <div class="text-danger mt-1"
                                         th:if="${#fields.hasErrors('password')}"
                                         th:errors="*{password}">
                                    </div>
                                </div>

                                <button class="btn btn-dark w-100 btn-lg" type="submit">
                                    Register
                                </button>

                            </form>

                            <p class="text-center mt-4">
                                Already have an account?
                                <a th:href="@{/auth/login}">
                                    Login here
                                </a>
                            </p>

                        </div>

                    </div>

                </div>

            </div>

        </div>

    </div>

</section>

</body>
</html>
