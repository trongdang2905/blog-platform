<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Admin - Manage Users</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <style>
        .btn-theme-primary {
            background-color: #7c3aed;
            border-color: #7c3aed;
            color: #fff;
        }
        .btn-theme-primary:hover {
            background-color: #6b2fd6;
            border-color: #6b2fd6;
            color: #fff;
        }
        .table-theme-header {
            background-color: #1e1b2e !important;
            color: #ffffff !important;
        }
        /* Style cho nút Phân trang */
        .page-item.active .page-link {
            background-color: #7c3aed !important;
            border-color: #7c3aed !important;
            color: #fff !important;
        }
        .page-link {
            color: #1e1b2e;
        }
    </style>
</head>
<body class="bg-light">

<div th:replace="~{fragments/nav :: nav}"></div>

<div class="container mt-5">
    <!-- Header Layout -->
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="fw-bold" style="color: #1e1b2e;">User Management</h2>
    </div>

    <!-- Filter and Search Bar -->
    <form th:action="@{/admin/users}" method="get" class="row g-3 mb-4">
        <div class="col-md-7">
            <div class="input-group shadow-sm">
                <span class="input-group-text bg-white"><i class="bi bi-search text-muted"></i></span>
                <input type="text" name="search" th:value="${param.search}" class="form-control" placeholder="Search by username or email...">
            </div>
        </div>
        <div class="col-md-3">
            <select name="status" class="form-select shadow-sm">
                <option value="">-- All Statuses --</option>
                <option value="ACTIVE" th:selected="${param.status != null && param.status[0] == 'ACTIVE'}">ACTIVE</option>
                <option value="BANNED" th:selected="${param.status != null && param.status[0] == 'BANNED'}">BANNED</option>
            </select>
        </div>
        <div class="col-md-2">
            <button type="submit" class="btn btn-theme-primary w-100 shadow-sm">
                <i class="bi bi-funnel-fill me-1"></i> Filter
            </button>
        </div>
    </form>

    <!-- Data Table -->
    <div class="card shadow-sm border-0 mb-4">
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-striped table-hover align-middle mb-0">
                    <thead>
                    <tr class="table-theme-header">
                        <th style="width: 8%;" class="ps-3 py-3">ID</th>
                        <th class="py-3">Username</th>
                        <th class="py-3">Email</th>
                        <th style="width: 25%;" class="py-3">Role</th>
                        <th style="width: 15%;" class="text-center py-3">Status</th>
                        <th style="width: 15%;" class="text-center py-3">Actions</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="user : ${users}">
                        <td class="fw-bold ps-3" th:text="${user.id}">1</td>
                        <td th:text="${user.username}">username</td>
                        <td th:text="${user.email}">email@example.com</td>
                        <td>
                            <form th:action="@{/admin/users/update-role/{id}(id=${user.id})}" method="post" class="d-flex align-items-center">
                                <select name="role" class="form-select form-select-sm me-2" style="width: 130px;">
                                    <option value="MEMBER" th:selected="${user.role.name() == 'MEMBER'}">MEMBER</option>
                                    <option value="MODERATOR" th:selected="${user.role.name() == 'MODERATOR'}">MODERATOR</option>
                                    <option value="ADMIN" th:selected="${user.role.name() == 'ADMIN'}">ADMIN</option>
                                </select>
                                <button type="submit" class="btn btn-sm btn-outline-success" title="Save Role">
                                    <i class="bi bi-check-lg"></i> Save
                                </button>
                            </form>
                        </td>
                        <td class="text-center">
                            <span th:if="${user.statusUser.name() == 'ACTIVE'}" class="badge bg-success">ACTIVE</span>
                            <span th:if="${user.statusUser.name() == 'BANNED'}" class="badge bg-danger">BANNED</span>
                        </td>
                        <td class="text-center">
                            <form th:action="@{/admin/users/toggle-status/{id}(id=${user.id})}" method="post">
                                <button th:if="${user.statusUser.name() == 'ACTIVE'}" type="submit" class="btn btn-sm btn-outline-danger w-75">
                                    <i class="bi bi-lock-fill me-1"></i> Ban
                                </button>
                                <button th:if="${user.statusUser.name() == 'BANNED'}" type="submit" class="btn btn-sm btn-outline-success w-75">
                                    <i class="bi bi-unlock-fill me-1"></i> Unban
                                </button>
                            </form>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(users)}">
                        <td colspan="6" class="text-center text-muted py-4">No users found.</td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Thanh Phân Trang (Pagination) -->
    <div th:if="${totalPages > 0}" class="d-flex justify-content-center pb-5">
        <nav>
            <ul class="pagination mb-0">
                <!-- Nút Previous -->
                <li class="page-item" th:classappend="${currentPage == 0} ? 'disabled'">
                    <a class="page-link" th:href="@{/admin/users(page=${currentPage - 1}, search=${param.search}, status=${param.status})}">Previous</a>
                </li>

                <!-- Danh sách các số trang 1, 2, 3... -->
                <li class="page-item"
                    th:each="i : ${#numbers.sequence(0, totalPages - 1)}"
                    th:classappend="${i == currentPage} ? 'active'">
                    <a class="page-link"
                       th:href="@{/admin/users(page=${i}, search=${param.search}, status=${param.status})}"
                       th:text="${i + 1}">1</a>
                </li>

                <!-- Nút Next -->
                <li class="page-item" th:classappend="${currentPage + 1 == totalPages} ? 'disabled'">
                    <a class="page-link" th:href="@{/admin/users(page=${currentPage + 1}, search=${param.search}, status=${param.status})}">Next</a>
                </li>
            </ul>
        </nav>
    </div>

</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
