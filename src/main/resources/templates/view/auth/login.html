<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Login</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<section class="vh-100 bg-image"
         style="
            background-image: url('/image/login.png');
            background-repeat: no-repeat;
            background-position: center;
            background-size: cover;

         ">

    <div class="mask d-flex align-items-center h-100"
         style="background: rgba(255,255,255,0.2);">

        <div class="container h-100">

            <div class="row d-flex justify-content-center align-items-center h-100">

                <div class="col-md-6 col-lg-5">

                    <div class="card shadow-lg" style="border-radius:15px;">

                        <div class="card-body p-5">

                            <h2 class="text-center mb-4 fw-bold">BLOG PLATFORM</h2>

                            <h5 class="text-center text-muted mb-4">Login</h5>



                            <form method="post" th:action="@{/auth/login}">

                                <div class="mb-4">

                                    <label class="form-label fw-bold">
                                        Email
                                    </label>

                                    <input
                                            class="form-control form-control-lg"
                                            name="email"
                                            placeholder="name@example.com"
                                            type="email"

                                    />
                                </div>

                                <div class="mb-4">

                                    <label class="form-label fw-bold">
                                        Password
                                    </label>

                                    <input
                                            class="form-control form-control-lg"
                                            name="password"
                                            placeholder="Enter password"
                                            type="password"
                                    />
                                </div>

                                <p class="text-danger text-center"
                                   th:if="${errorMessage != null}"
                                   th:text="${errorMessage}">
                                </p>

                                <button class="btn btn-dark w-100 btn-lg" type="submit">
                                    Login
                                </button>

                                <p class="text-center mt-4">

                                    Don't have an account?

                                    <a th:href="@{/auth/register}">
                                        Create an account
                                    </a>
                                </p>

                            </form>

                        </div>

                    </div>

                </div>

            </div>

        </div>

    </div>

</section>

</body>
</html>
