<!DOCTYPE html>
<html lang="vi" xmlns:th="https://www.thymeleaf.org/">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ForumFPT</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg: #f5f4f0;
            --surface: #ffffff;
            --border: #e4e2db;
            --text: #1a1a18;
            --text-muted: #7a7870;
            --accent: #2563eb;
            --accent-light: #eff6ff;
            --tag-bg: #f0efeb;
            --hot: #e85c2c;
            --saved: #d97706;
            --saved-bg: #fffbeb;
            --report: #dc2626;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            font-size: 14px;
            line-height: 1.5;
        }

        /* NAV */
        nav {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 0 24px;
            height: 52px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .logo {
            font-size: 16px;
            font-weight: 700;
            color: var(--accent);
            letter-spacing: -0.3px;
            text-decoration: none;
        }

        .logo span {
            color: var(--text);
        }

        .nav-center {
            flex: 1;
            max-width: 340px;
            margin: 0 24px;
            position: relative;
        }

        .nav-right {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn {
            padding: 6px 14px;
            border-radius: 6px;
            font-size: 13px;
            cursor: pointer;
            border: none;
            font-weight: 500;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 5px;
            transition: opacity 0.15s;
        }

        .btn:hover {
            opacity: 0.85;
        }

        .btn-ghost {
            background: transparent;
            color: var(--text-muted);
            border: 1px solid var(--border);
        }

        .btn-primary {
            background: var(--accent);
            color: #fff;
        }

        /* SEARCH BAR */
        .search-form {
            display: flex;
            align-items: center;
            gap: 0;
            width: 100%;
        }

        .search-input-wrap {
            position: relative;
            flex: 1;
        }

        .search-icon {
            position: absolute;
            left: 10px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 13px;
            color: var(--text-muted);
            pointer-events: none;
        }

        .search-input {
            width: 100%;
            padding: 6px 12px 6px 30px;
            border: 1px solid var(--border);
            border-right: none;
            border-radius: 6px 0 0 6px;
            font-size: 13px;
            font-family: inherit;
            color: var(--text);
            background: var(--bg);
            outline: none;
            transition: border-color 0.15s, box-shadow 0.15s;
        }

        .search-input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.08);
            background: var(--surface);
        }

        .search-clear {
            position: absolute;
            right: 8px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            font-size: 14px;
            color: var(--text-muted);
            cursor: pointer;
            display: none;
            line-height: 1;
            padding: 2px;
        }

        .search-clear.show {
            display: block;
        }

        .search-clear:hover {
            color: var(--text);
        }

        .search-btn {
            padding: 6px 12px;
            background: var(--accent);
            color: #fff;
            border: 1px solid var(--accent);
            border-radius: 0 6px 6px 0;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            white-space: nowrap;
            transition: opacity 0.15s;
        }

        .search-btn:hover {
            opacity: 0.88;
        }

        /* SEARCH DROPDOWN */
        .search-dropdown {
            position: absolute;
            top: calc(100% + 6px);
            left: 0;
            right: 0;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.1);
            z-index: 99;
            display: none;
            overflow: hidden;
        }

        .search-dropdown.show {
            display: block;
        }

        .dropdown-section {
            padding: 8px 0;
        }

        .dropdown-label {
            padding: 4px 14px 6px;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text-muted);
        }

        .dropdown-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 9px 14px;
            font-size: 13px;
            cursor: pointer;
            text-decoration: none;
            color: var(--text);
            transition: background 0.1s;
        }

        .dropdown-item:hover, .dropdown-item.focused {
            background: var(--bg);
        }

        .dropdown-item .item-icon {
            font-size: 15px;
            flex-shrink: 0;
        }

        .dropdown-item .item-text {
            flex: 1;
        }

        .dropdown-item .item-text strong {
            display: block;
            font-weight: 500;
        }

        .dropdown-item .item-text span {
            font-size: 12px;
            color: var(--text-muted);
        }

        .dropdown-item .item-badge {
            font-size: 11px;
            padding: 1px 6px;
            border-radius: 4px;
            background: var(--accent-light);
            color: var(--accent);
            font-weight: 500;
        }

        .dropdown-divider {
            height: 1px;
            background: var(--border);
            margin: 4px 0;
        }

        .dropdown-footer {
            padding: 9px 14px;
            font-size: 12px;
            color: var(--accent);
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            font-weight: 500;
            transition: background 0.1s;
        }

        .dropdown-footer:hover {
            background: var(--bg);
        }

        /* SEARCH RESULTS BANNER */
        .search-banner {
            display: none;
            align-items: center;
            justify-content: space-between;
            padding: 10px 14px;
            background: var(--accent-light);
            border: 1px solid #bfdbfe;
            border-radius: 7px;
            margin-bottom: 12px;
            font-size: 13px;
        }

        .search-banner.show {
            display: flex;
        }

        .search-banner strong {
            color: var(--accent);
        }

        .search-banner-clear {
            background: none;
            border: none;
            font-size: 12px;
            color: var(--accent);
            cursor: pointer;
            font-weight: 500;
            text-decoration: underline;
        }

        /* LAYOUT */
        .layout {
            max-width: 1000px;
            margin: 0 auto;
            padding: 24px 16px;
            display: grid;
            grid-template-columns: 1fr 240px;
            gap: 24px;
        }

        .section-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 12px;
        }

        .section-title {
            font-size: 13px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text-muted);
        }


        /* POST CARD */
        .post-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 16px;
            margin-bottom: 8px;
            transition: border-color 0.15s, box-shadow 0.15s;
            display: block;
            color: inherit;
            position: relative;
        }

        .post-card:hover {
            border-color: var(--accent);
            box-shadow: 0 2px 8px rgba(37, 99, 235, 0.07);
        }

        .post-card-link {
            text-decoration: none;
            color: inherit;
            display: block;
        }

        .post-meta {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 8px;
        }

        .avatar {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            font-weight: 600;
            color: #fff;
            flex-shrink: 0;
        }

        .post-author {
            font-size: 13px;
            font-weight: 500;
        }

        .post-time {
            font-size: 12px;
            color: var(--text-muted);
        }

        .topic-badge {
            margin-left: auto;
            font-size: 11px;
            padding: 2px 7px;
            border-radius: 4px;
            font-weight: 500;
            background: var(--accent-light);
            color: var(--accent);
        }

        .post-title {
            font-size: 15px;
            font-weight: 600;
            margin-bottom: 6px;
            line-height: 1.4;
        }

        .post-excerpt {
            font-size: 13px;
            color: var(--text-muted);
            margin-bottom: 10px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .post-footer {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .stat {
            display: flex;
            align-items: center;
            gap: 4px;
            font-size: 12px;
            color: var(--text-muted);
        }

        .hot-badge {
            font-size: 11px;
            color: var(--hot);
            font-weight: 600;
        }

        .post-actions {
            margin-left: auto;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .icon-btn {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 4px 9px;
            border: 1px solid var(--border);
            border-radius: 6px;
            background: transparent;
            font-size: 12px;
            font-weight: 500;
            color: var(--text-muted);
            cursor: pointer;
            transition: all 0.15s;
            white-space: nowrap;
            text-decoration: none;
        }

        .icon-btn.save:hover, .icon-btn.save.saved {
            border-color: var(--saved);
            background: var(--saved-bg);
            color: var(--saved);
        }

        .icon-btn.report:hover {
            border-color: #fca5a5;
            background: #fef2f2;
            color: var(--report);
        }

        /* highlight keyword in results */
        mark {
            background: #fef08a;
            color: var(--text);
            border-radius: 2px;
            padding: 0 1px;
        }

        /* MODAL */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.4);
            z-index: 50;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s;
        }

        .modal-overlay.show {
            opacity: 1;
            pointer-events: all;
        }

        .modal {
            background: var(--surface);
            border-radius: 12px;
            padding: 24px;
            width: 100%;
            max-width: 420px;
            margin: 16px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.14);
            transform: translateY(12px);
            transition: transform 0.2s;
        }

        .modal-overlay.show .modal {
            transform: translateY(0);
        }

        .modal-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 16px;
        }

        .modal-title {
            font-size: 15px;
            font-weight: 700;
        }

        .modal-close {
            background: none;
            border: none;
            font-size: 18px;
            cursor: pointer;
            color: var(--text-muted);
            padding: 2px 6px;
            border-radius: 4px;
        }

        .modal-close:hover {
            background: var(--bg);
            color: var(--text);
        }

        .modal-desc {
            font-size: 13px;
            color: var(--text-muted);
            margin-bottom: 14px;
        }

        .report-options {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 16px;
        }

        .report-option {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 12px;
            border: 1.5px solid var(--border);
            border-radius: 7px;
            cursor: pointer;
            font-size: 13px;
            transition: border-color 0.15s, background 0.15s;
        }

        .report-option:hover {
            border-color: var(--report);
            background: #fef2f2;
        }

        .report-option input[type="radio"] {
            accent-color: var(--report);
            flex-shrink: 0;
        }

        .report-option.selected {
            border-color: var(--report);
            background: #fef2f2;
        }

        .report-note {
            width: 100%;
            padding: 9px 12px;
            border: 1px solid var(--border);
            border-radius: 7px;
            font-size: 13px;
            font-family: inherit;
            resize: vertical;
            min-height: 72px;
            margin-bottom: 16px;
            outline: none;
            transition: border-color 0.15s;
        }

        .report-note:focus {
            border-color: var(--report);
            box-shadow: 0 0 0 3px rgba(220, 38, 38, 0.08);
        }

        .modal-footer {
            display: flex;
            gap: 8px;
            justify-content: flex-end;
        }

        .btn-cancel {
            padding: 8px 16px;
            border-radius: 6px;
            border: 1px solid var(--border);
            background: transparent;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            color: var(--text-muted);
        }

        .btn-cancel:hover {
            background: var(--bg);
        }

        .btn-report-submit {
            padding: 8px 18px;
            border-radius: 6px;
            border: none;
            background: var(--report);
            color: #fff;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.15s;
        }

        .btn-report-submit:hover {
            opacity: 0.88;
        }

        .btn-report-submit:disabled {
            opacity: 0.45;
            cursor: not-allowed;
        }

        /* TOAST */
        .toast {
            position: fixed;
            bottom: 24px;
            right: 24px;
            background: var(--text);
            color: #fff;
            padding: 11px 16px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 500;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.18);
            transform: translateY(60px);
            opacity: 0;
            transition: transform 0.25s, opacity 0.25s;
            z-index: 100;
            display: flex;
            align-items: center;
            gap: 8px;
            pointer-events: none;
        }

        .toast.show {
            transform: translateY(0);
            opacity: 1;
        }

        /* SIDEBAR */
        .sidebar {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 14px;
        }

        .card-title {
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 12px;
        }

        .topic-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 7px 0;
            border-bottom: 1px solid var(--border);
            cursor: pointer;
            text-decoration: none;
            color: inherit;
            transition: color 0.15s;
        }

        .topic-item:hover .topic-name {
            color: var(--accent);
        }

        .topic-item:last-child {
            border-bottom: none;
            padding-bottom: 0;
        }

        .topic-name {
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: color 0.15s;
        }

        .topic-count {
            font-size: 12px;
            color: var(--text-muted);
        }

        .new-post-btn {
            width: 100%;
            padding: 10px;
            background: var(--accent);
            color: #fff;
            border: none;
            border-radius: 7px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            text-align: center;
            text-decoration: none;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            transition: opacity 0.15s, box-shadow 0.15s;
        }

        .new-post-btn:hover {
            opacity: 0.9;
            box-shadow: 0 2px 8px rgba(37, 99, 235, 0.25);
        }

        /* PAGINATION */
        .pagination {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
            margin-top: 16px;
            padding-bottom: 8px;
        }

        .page-btn {
            min-width: 34px;
            height: 34px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border: 1px solid var(--border);
            border-radius: 6px;
            background: var(--surface);
            color: var(--text-muted);
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.15s;
            padding: 0 8px;
        }

        .page-btn:hover {
            border-color: var(--accent);
            color: var(--accent);
            background: var(--accent-light);
        }

        .page-btn.active {
            background: var(--accent);
            color: #fff;
            border-color: var(--accent);
            pointer-events: none;
        }

        .page-btn.disabled {
            opacity: 0.4;
            pointer-events: none;
            cursor: default;
        }

        .page-dots {
            font-size: 13px;
            color: var(--text-muted);
            padding: 0 4px;
        }
    </style>
</head>
<body>

<nav>
    <a href="/" class="logo">Forum<span>FPT</span></a>

    <!-- SEARCH FORM -->
    <div class="nav-center">
        <form class="search-form" id="searchForm" action="/user/post/search" method="GET" autocomplete="off"
              onsubmit="handleSearchSubmit(event)">
            <div class="search-input-wrap">
                <span class="search-icon">🔍</span>
                <input
                        class="search-input"
                        type="text"
                        id="searchInput"
                        name="keyword"
                        placeholder="Tìm kiếm bài viết..."
                        th:value="${keyword}"

                >

            </div>
            <button type="submit" class="search-btn">Tìm</button>
        </form>


    </div>

    <div class="nav-right">
        <a href="/auth/login" class="btn btn-ghost">Đăng nhập</a>
        <a href="/auth/register" class="btn btn-primary">Đăng ký</a>
    </div>
</nav>

<div class="layout">
    <div>
        <div class="section-header">
            <span class="section-title">Bài viết</span>

        </div>

        <!-- SEARCH RESULT BANNER (Thymeleaf — hiện khi có keyword) -->
        <div class="search-banner" th:classappend="${keyword != null and !#strings.isEmpty(keyword)} ? 'show' : ''"
             id="searchBanner">
            <span>Kết quả tìm kiếm cho: <strong th:text="'&quot;' + ${keyword} + '&quot;'">"..."</strong>
                &nbsp;·&nbsp;
                <span th:text="${#lists.size(posts)} + ' bài viết'" id="resultCount">0 bài viết</span>
            </span>
            <button class="search-banner-clear" onclick="window.location.href='/'">✕ Xoá tìm kiếm</button>
        </div>


        <div class="post-card" th:each="post : ${posts}">
            <a class="post-card-link" th:href="@{/user/post/{id}(id=${post.id})}">
                <div class="post-meta">
                    <div class="avatar" style="background:#2563eb"
                         th:text="${#strings.toUpperCase(#strings.substring(post.username, 0, 1))}">N
                    </div>
                    <span class="post-author" th:text="${post.username}">username</span>
                    <span class="post-time" th:text="${post.getDuration()}">vừa xong</span>
                    <span class="topic-badge" th:text="${post.topicName}">Chủ đề</span>
                </div>
                <div class="post-title" th:text="${post.title}">Tiêu đề bài viết</div>
                <div class="post-excerpt" th:text="${#strings.abbreviate(post.content, 160)}">Nội dung...</div>
            </a>
            <div class="post-footer">
                <span class="hot-badge" th:if="${post.pinned}">📌 Ghim</span>
                <div class="post-actions">
                    <button class="icon-btn save" th:attr="data-id=${post.id}"
                            th:classappend="${post.saved} ? 'saved' : ''"
                            onclick="toggleSave(this)" title="Lưu bài viết">
                        🔖 <span class="save-label" th:text="${post.saved} ? 'Đã lưu' : 'Lưu'">Lưu</span>
                    </button>
                    <button class="icon-btn report" th:attr="data-id=${post.id}"
                            onclick="openReport(this)" title="Báo cáo bài viết">
                        🚩 Báo cáo
                    </button>
                </div>
            </div>
        </div>


        <!-- PAGINATION -->
        <div class="pagination" th:if="${totalPages > 1}">

            <!-- Prev -->
            <a class="page-btn"
               th:classappend="${currentPage == 1} ? ' disabled' : ''"
               th:href="@{/(currentPage=${currentPage - 1})}">← Trước</a>

            <!-- Render tất cả trang nếu totalPages <= 7, không cần logic ... -->
            <th:block th:if="${totalPages <= 7}">
                <th:block th:each="i : ${#numbers.sequence(1, totalPages)}">
                    <a class="page-btn"
                       th:classappend="${i == currentPage} ? ' active' : ''"
                       th:href="@{/(currentPage=${i})}"
                       th:text="${i}">1</a>
                </th:block>
            </th:block>

            <!-- Nếu totalPages > 7 mới dùng logic ... -->
            <th:block th:if="${totalPages > 7}">
                <!-- Trang đầu -->
                <a class="page-btn"
                   th:classappend="${currentPage == 1} ? ' active' : ''"
                   th:href="@{/(currentPage=1)}">1</a>

                <span class="page-dots" th:if="${currentPage > 3}">...</span>

                <th:block th:each="i : ${#numbers.sequence(
            (currentPage > 2 ? currentPage - 1 : 2),
            (currentPage < totalPages - 1 ? currentPage + 1 : totalPages - 1)
        )}">
                    <a class="page-btn"
                       th:classappend="${i == currentPage} ? ' active' : ''"
                       th:href="@{/(currentPage=${i})}"
                       th:text="${i}">2</a>
                </th:block>

                <span class="page-dots" th:if="${currentPage < totalPages - 2}">...</span>

                <!-- Trang cuối -->
                <a class="page-btn"
                   th:classappend="${currentPage == totalPages} ? ' active' : ''"
                   th:href="@{/(currentPage=${totalPages})}"
                   th:text="${totalPages}">N</a>
            </th:block>

            <!-- Next -->
            <a class="page-btn"
               th:classappend="${currentPage == totalPages} ? ' disabled' : ''"
               th:href="@{/(currentPage=${currentPage + 1})}">Tiếp →</a>

        </div>
    </div>


    <!-- SIDEBAR -->
    <div class="sidebar">
        <a href="/user/post/create" class="new-post-btn">✏️ Viết bài mới</a>
        <div class="card">
            <div class="card-title">Chủ đề</div>
            <a class="topic-item" th:each="topic : ${session.topics}" th:href="@{/topics/{id}(id=${topic.id})}">
                <span class="topic-name" th:text="${topic.name}">Chủ đề</span>
            </a>
        </div>
    </div>
</div>

<!-- REPORT MODAL -->
<div class="modal-overlay" id="reportModal" onclick="closeReportOnOverlay(event)">
    <div class="modal">
        <div class="modal-header">
            <span class="modal-title">🚩 Báo cáo bài viết</span>
            <button class="modal-close" onclick="closeReport()">✕</button>
        </div>
        <p class="modal-desc">Chọn lý do báo cáo. Chúng tôi sẽ xem xét và xử lý trong vòng 24 giờ.</p>
        <div class="report-options">
            <label class="report-option" onclick="selectOption(this)"><input type="radio" name="reportReason"
                                                                             value="spam"> Spam hoặc quảng cáo</label>
            <label class="report-option" onclick="selectOption(this)"><input type="radio" name="reportReason"
                                                                             value="misinformation"> Thông tin sai lệch</label>
            <label class="report-option" onclick="selectOption(this)"><input type="radio" name="reportReason"
                                                                             value="harassment"> Quấy rối / xúc
                phạm</label>
            <label class="report-option" onclick="selectOption(this)"><input type="radio" name="reportReason"
                                                                             value="inappropriate"> Nội dung không phù
                hợp</label>
            <label class="report-option" onclick="selectOption(this)"><input type="radio" name="reportReason"
                                                                             value="other"> Lý do khác</label>
        </div>
        <textarea class="report-note" id="reportNote" placeholder="Mô tả thêm (không bắt buộc)..." rows="3"></textarea>
        <div class="modal-footer">
            <button class="btn-cancel" onclick="closeReport()">Huỷ</button>
            <button class="btn-report-submit" id="reportSubmitBtn" onclick="submitReport()" disabled>Gửi báo cáo
            </button>
        </div>
    </div>
</div>

<div class="toast" id="toast"></div>

<script>
    /* ── TABS ── */
    document.querySelectorAll('.tab').forEach(tab => {
        tab.addEventListener('click', () => {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            tab.classList.add('active');
        });
    });

    /* ── TOAST ── */
    let toastTimer;

    function showToast(msg) {
        const el = document.getElementById('toast');
        el.textContent = msg;
        el.classList.add('show');
        clearTimeout(toastTimer);
        toastTimer = setTimeout(() => el.classList.remove('show'), 3000);
    }

    function submitSearch(keyword) {
        window.location.href = '/user/post/search?keyword=' + encodeURIComponent(keyword);
    }

    function handleSearchSubmit(e) {
        e.preventDefault();
        const keyword = document.getElementById('searchInput').value.trim();
        if (!keyword) return;
        submitSearch(keyword);
    }


    /* ── SAVE ── */
    function toggleSave(btn) {
        const postId = btn.dataset.id;
        const isSaved = btn.classList.contains('saved');
        const label = btn.querySelector('.save-label');
        const url = isSaved ? `/user/post/unsave?postId=${postId}` : `/user/post/save?postId=${postId}`;
        fetch(url, {method: 'POST', headers: {'X-Requested-With': 'XMLHttpRequest'}})
            .then(res => {
                if (!res.ok) throw new Error();
                btn.classList.toggle('saved', !isSaved);
                label.textContent = isSaved ? 'Lưu' : 'Đã lưu';
                showToast(isSaved ? 'Đã bỏ lưu bài viết.' : '✅ Đã lưu bài viết vào danh sách của bạn.');
            })
            .catch(() => showToast('❌ Có lỗi xảy ra. Vui lòng thử lại.'));
    }

    /* ── REPORT ── */
    let currentReportPostId = null;

    function openReport(btn) {
        currentReportPostId = btn.dataset.id;
        document.querySelectorAll('input[name="reportReason"]').forEach(r => r.checked = false);
        document.querySelectorAll('.report-option').forEach(o => o.classList.remove('selected'));
        document.getElementById('reportNote').value = '';
        document.getElementById('reportSubmitBtn').disabled = true;
        document.getElementById('reportModal').classList.add('show');
    }

    function closeReport() {
        document.getElementById('reportModal').classList.remove('show');
        currentReportPostId = null;
    }

    function closeReportOnOverlay(e) {
        if (e.target === document.getElementById('reportModal')) closeReport();
    }

    function selectOption(label) {
        document.querySelectorAll('.report-option').forEach(o => o.classList.remove('selected'));
        label.classList.add('selected');
        document.getElementById('reportSubmitBtn').disabled = false;
    }

    function submitReport() {
        const reason = document.querySelector('input[name="reportReason"]:checked')?.value;
        const note = document.getElementById('reportNote').value.trim();
        if (!reason || !currentReportPostId) return;
        const body = new URLSearchParams({postId: currentReportPostId, reason, note});
        fetch('/user/report/create', {
            method: 'POST',
            headers: {'Content-Type': 'application/x-www-form-urlencoded', 'X-Requested-With': 'XMLHttpRequest'},
            body: body.toString()
        }).then(res => {
            if (!res.ok) throw new Error();
            closeReport();
            showToast('✅ Báo cáo đã được gửi. Cảm ơn bạn!');
        }).catch(() => showToast('❌ Gửi báo cáo thất bại. Vui lòng thử lại.'));
    }

    document.addEventListener('keydown', e => {
        if (e.key === 'Escape') closeReport();
    });
</script>
</body>
</html>
