<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Admin - Manage Topics</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div th:replace="~{fragments/nav :: nav}"></div>

<div class="container mt-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="text-dark">Topic Management</h2>
        <a th:href="@{/admin/topics/create}" class="btn btn-primary">Add New Topic</a>
    </div>

    <div class="card shadow-sm">
        <div class="card-body">
            <table class="table table-striped table-hover align-middle">
                <thead class="table-dark">
                <tr>
                    <th>ID</th>
                    <th>Name</th>
                    <th>Slug</th>
                    <th>Description</th>
                    <th>Status</th>
                    <th>Order</th>
                    <th class="text-center">Actions</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="topic : ${topics}">
                    <td th:text="${topic.id}">1</td>
                    <td th:text="${topic.name}" class="fw-bold">Java</td>
                    <td th:text="${topic.slug}">java</td>
                    <td th:text="${topic.description}">Java Web Development</td>
                    <td>
                        <span th:if="${topic.isActive}" class="badge bg-success">Active</span>
                        <span th:unless="${topic.isActive}" class="badge bg-danger">Inactive</span>
                    </td>
                    <td th:text="${topic.displayOrder}">1</td>
                    <td class="text-center">
                        <a th:href="@{/admin/topics/edit/{id}(id=${topic.id})}" class="btn btn-sm btn-warning me-2">Edit</a>
                        <a th:href="@{/admin/topics/delete/{id}(id=${topic.id})}"
                           class="btn btn-sm btn-danger"
                           onclick="return confirm('Are you sure you want to delete this topic?')">Delete</a>
                    </td>
                </tr>
                <tr th:if="${#lists.isEmpty(topics)}">
                    <td colspan="7" class="text-center text-muted">No topics found.</td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
</body>
</html>
