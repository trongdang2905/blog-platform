<!DOCTYPE html>
<html lang="en" xmlns:th="https://www.thymeleaf.org/">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Viết bài mới – ForumFPT</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg: #f5f4f0;
            --surface: #ffffff;
            --border: #e4e2db;
            --text: #1a1a18;
            --text-muted: #7a7870;
            --accent: #2563eb;
            --accent-light: #eff6ff;
            --error: #dc2626;
            --success: #16a34a;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            font-size: 14px;
            line-height: 1.5;
        }

        nav {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 0 24px;
            height: 52px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .logo {
            font-size: 16px;
            font-weight: 700;
            color: var(--accent);
            letter-spacing: -0.3px;
            text-decoration: none;
        }

        .logo span {
            color: var(--text);
        }

        .nav-right {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn {
            padding: 6px 14px;
            border-radius: 6px;
            font-size: 13px;
            cursor: pointer;
            border: none;
            font-weight: 500;
            transition: opacity 0.15s;
        }

        .btn:hover {
            opacity: 0.85;
        }

        .btn-ghost {
            background: transparent;
            color: var(--text-muted);
            border: 1px solid var(--border);
        }

        .btn-primary {
            background: var(--accent);
            color: #fff;
        }

        .breadcrumb {
            max-width: 760px;
            margin: 20px auto 0;
            padding: 0 16px;
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 13px;
            color: var(--text-muted);
        }

        .breadcrumb a {
            color: var(--accent);
            text-decoration: none;
        }

        .breadcrumb a:hover {
            text-decoration: underline;
        }

        .layout {
            max-width: 760px;
            margin: 16px auto 48px;
            padding: 0 16px;
        }

        .page-header {
            margin-bottom: 20px;
        }

        .page-header h1 {
            font-size: 22px;
            font-weight: 700;
            letter-spacing: -0.3px;
            margin-bottom: 4px;
        }

        .page-header p {
            font-size: 13px;
            color: var(--text-muted);
        }

        /* ── RESPONSE BANNER ── */
        .response-banner {
            display: flex;
            align-items: flex-start;
            gap: 12px;
            padding: 14px 16px;
            border-radius: 9px;
            border: 1px solid;
            margin-bottom: 20px;
            font-size: 13px;
            line-height: 1.5;
            animation: slideDown 0.3s ease;
        }

        .text-danger {
            display: flex;
            align-items: center;
            gap: 6px;

            margin-top: 6px;
            padding: 6px 10px;

            color: #b91c1c;
            background-color: #fef2f2;
            border: 1px solid #fecaca;
            border-radius: 6px;

            font-size: 13px;
            font-weight: 500;
        }

        .text-danger::before {
            content: "⚠";
            font-size: 14px;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-8px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .response-banner.success {
            background: #f0fdf4;
            border-color: #86efac;
            color: #166534;
        }

        .response-banner.error {
            background: #fef2f2;
            border-color: #fca5a5;
            color: #991b1b;
        }

        .banner-icon {
            font-size: 18px;
            flex-shrink: 0;
            line-height: 1.3;
        }

        .banner-body {
            flex: 1;
        }

        .banner-body strong {
            display: block;
            font-weight: 600;
            margin-bottom: 2px;
        }

        .banner-body span {
            color: inherit;
            opacity: 0.85;
        }

        .banner-close {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 16px;
            color: inherit;
            opacity: 0.5;
            padding: 0 4px;
            flex-shrink: 0;
            line-height: 1;
        }

        .banner-close:hover {
            opacity: 1;
        }

        /* ── FORM CARD ── */
        .form-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 10px;
            overflow: hidden;
        }

        .form-body {
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .field {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .field label {
            font-size: 13px;
            font-weight: 600;
            color: var(--text);
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .field label .required {
            color: var(--error);
            font-weight: 700;
        }

        input[type="text"], input[type="file"], select, textarea {
            width: 100%;
            padding: 9px 12px;
            border: 1px solid var(--border);
            border-radius: 7px;
            font-size: 14px;
            font-family: inherit;
            color: var(--text);
            background: var(--surface);
            transition: border-color 0.15s, box-shadow 0.15s;
            outline: none;
        }

        input[type="text"]:focus, select:focus, textarea:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
        }

        input[type="text"]#title {
            font-size: 16px;
            font-weight: 600;
            padding: 11px 14px;
        }

        textarea#content {
            resize: vertical;
            min-height: 220px;
        }

        .two-col {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }

        .form-divider {
            height: 1px;
            background: var(--border);
            margin: 4px 0;
        }

        .form-footer {
            padding: 16px 24px;
            background: var(--bg);
            border-top: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
        }

        .footer-left {
            font-size: 12px;
            color: var(--text-muted);
        }

        .footer-actions {
            display: flex;
            gap: 8px;
        }

        .btn-lg {
            padding: 9px 20px;
            font-size: 14px;
        }

        @media (max-width: 560px) {
            .two-col {
                grid-template-columns: 1fr;
            }

            .form-footer {
                flex-direction: column;
                align-items: stretch;
            }

            .footer-actions {
                justify-content: flex-end;
            }
        }
    </style>
</head>
<body>

<div th:replace="~{fragments/nav :: nav}"></div>

<div class="breadcrumb">
    <a href="/">Trang chủ</a>
    <span>›</span>
    <span>Viết bài mới</span>
</div>

<div class="layout">
    <div class="page-header">
        <h1>Viết bài mới</h1>
        <p>Chia sẻ kiến thức, kinh nghiệm, hoặc câu chuyện của bạn với cộng đồng.</p>
    </div>

    <!-- ── RESPONSE BANNER (Thymeleaf) ── -->
    <div th:if="${response != null}">

        <!-- SUCCESS -->
        <div th:if="${response.success}" class="response-banner success" id="responseBanner">
            <span class="banner-icon">✅</span>
            <div class="banner-body">
                <strong>Đăng bài thành công!</strong>
                <span th:text="${response.message}">Bài viết của bạn đã được đăng lên cộng đồng.</span>
            </div>
            <button class="banner-close" onclick="closeBanner()" title="Đóng">✕</button>
        </div>

        <!-- ERROR -->
        <div th:if="${!response.success}" class="response-banner error" id="responseBanner">
            <span class="banner-icon">❌</span>
            <div class="banner-body">
                <strong>Đăng bài thất bại!</strong>
                <span th:text="${response.message}">Đã xảy ra lỗi, vui lòng thử lại.</span>
            </div>
            <button class="banner-close" onclick="closeBanner()" title="Đóng">✕</button>
        </div>

    </div>

    <form id="createPostForm"
          action="create"
          method="POST"
          enctype="multipart/form-data"
          th:object="${dto}">

        <div class="form-card">
            <div class="form-body">
                <!--                <input type="hidden" name="userId">-->

                <!-- TITLE -->
                <div class="field">
                    <label for="title">Tiêu đề <span class="required">*</span></label>
                    <input type="text" id="title" name="title"
                           placeholder="Tiêu đề bài viết của bạn..."
                           autocomplete="off"
                           th:field="*{title}">
                    <div class="text-danger"
                         th:if="${#fields.hasErrors('title')}"
                         th:errors="*{title}">
                    </div>
                </div>

                <!-- CONTENT -->
                <div class="field">
                    <label for="content">Nội dung <span class="required">*</span></label>
                    <textarea id="content" name="content"
                              placeholder="Viết nội dung bài của bạn ở đây..."
                              rows="10" th:field="*{content}"></textarea>
                    <div class="text-danger"
                         th:if="${#fields.hasErrors('content')}"
                         th:errors="*{content}">
                    </div>
                </div>

                <!-- IMAGE FILE -->
                <div class="field">
                    <label for="image">Ảnh bìa</label>
                    <input type="file" id="image" name="image" accept="image/*">
                </div>

                <div class="form-divider"></div>

                <!-- TOPIC -->
                <div class="two-col">
                    <div class="field">
                        <label for="topicId">Chủ đề <span class="required">*</span></label>
                        <select id="topicId" name="topicId" th:field="*{topicId}">
                            <option value="">— Chọn chủ đề —</option>
                            <option th:each="topic : ${session.topics}"
                                    th:value="${topic.id}"
                                    th:text="${topic.name}">
                                Chủ đề
                            </option>
                        </select>
                    </div>
                    <div class="text-danger"
                         th:if="${#fields.hasErrors('topicId')}"
                         th:errors="*{topicId}">
                    </div>
                </div>

            </div>

            <!-- FORM FOOTER -->
            <div class="form-footer">
                <span class="footer-left"><span class="required">*</span> Các trường bắt buộc</span>
                <div class="footer-actions">
                    <button type="submit" class="btn btn-primary btn-lg">Đăng bài →</button>
                </div>
            </div>
        </div>

    </form>
</div>

<script>
    /* ── AUTO-SCROLL đến banner khi có response từ server ── */
    window.addEventListener('DOMContentLoaded', () => {
        const banner = document.getElementById('responseBanner');
        if (banner) {
            banner.scrollIntoView({behavior: 'smooth', block: 'center'});
            if (banner.classList.contains('success')) {
                setTimeout(() => closeBanner(), 6000);
            }
        }
    });

    function closeBanner() {
        const banner = document.getElementById('responseBanner');
        if (!banner) return;
        banner.style.transition = 'opacity 0.3s, transform 0.3s';
        banner.style.opacity = '0';
        banner.style.transform = 'translateY(-8px)';
        setTimeout(() => banner.remove(), 300);
    }
</script>
</body>
</html>
