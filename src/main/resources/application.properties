spring.application.name=blog-platform

spring.datasource.url=jdbc:sqlserver://localhost:1433;databaseName=BlogPlatform_DB;encrypt=true;trustServerCertificate=true;useUnicode=true;characterEncoding=UTF-8
spring.datasource.username=sa
spring.datasource.password=123

spring.jpa.database-platform=org.hibernate.dialect.SQLServerDialect
spring.jpa.hibernate.ddl-auto=update

logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type=TRACE

server.port=8080

spring.servlet.multipart.max-file-size=30MB
spring.servlet.multipart.max-request-size=30MB
server.tomcat.max-http-form-post-size=30MB
server.tomcat.max-swallow-size=-1

# ImageKit Configuration
app.imagekit.private=your_private_key_here