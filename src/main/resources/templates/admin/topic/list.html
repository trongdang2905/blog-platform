<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Admin - Manage Topics</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
</head>
<body class="bg-light">
<div class="container mt-5">
    <!-- Balanced Header Layout -->
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="text-dark fw-bold">Topic Management</h2>
        <div class="d-flex gap-2">
            <a th:href="@{/admin/users}" class="btn btn-outline-primary">
                <i class="bi bi-people-fill me-1"></i> Manage Users
            </a>
            <a th:href="@{/admin/topics/create}" class="btn btn-primary">
                <i class="bi bi-plus-circle me-1"></i> Add New Topic
            </a>
        </div>
    </div>

    <!-- Synchronized Search Form -->
    <form th:action="@{/admin/topics}" method="get" class="row g-3 mb-4">
        <div class="col-md-10">
            <div class="input-group shadow-sm">
                <span class="input-group-text bg-white"><i class="bi bi-search text-muted"></i></span>
                <input type="text" name="search" th:value="${param.search}" class="form-control" placeholder="Search by topic name or description...">
            </div>
        </div>
        <div class="col-md-2">
            <button type="submit" class="btn btn-primary w-100 shadow-sm"><i class="bi bi-funnel-fill me-1"></i>Filter</button>
        </div>
    </form>

    <!-- Minimalist Data Table -->
    <div class="card shadow-sm border-0">
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-striped table-hover align-middle mb-0">
                    <thead class="table-dark">
                    <tr>
                        <th style="width: 8%;" class="ps-3">ID</th>
                        <th style="width: 20%;">Name</th>
                        <th style="width: 20%;">Slug</th>
                        <th>Description</th>
                        <th style="width: 12%;" class="text-center">Status</th>
                        <th style="width: 10%;" class="text-center">Order</th>
                        <th style="width: 15%;" class="text-center">Actions</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="topic : ${topics}">
                        <td class="fw-bold ps-3" th:text="${topic.id}">1</td>
                        <td th:text="${topic.name}" class="fw-bold">Java</td>
                        <td th:text="${topic.slug}">java</td>
                        <td th:text="${topic.description}">Java Web Development</td>
                        <td class="text-center">
                            <span th:if="${topic.isActive}" class="badge bg-success">Active</span>
                            <span th:unless="${topic.isActive}" class="badge bg-danger">Inactive</span>
                        </td>
                        <td class="text-center" th:text="${topic.displayOrder}">1</td>
                        <td class="text-center">
                            <div class="d-flex justify-content-center gap-2">
                                <a th:href="@{/admin/topics/edit/{id}(id=${topic.id})}" class="btn btn-sm btn-outline-warning d-inline-flex align-items-center" title="Edit">
                                    <i class="bi bi-pencil-square me-1"></i> Edit
                                </a>
                                <a th:href="@{/admin/topics/delete/{id}(id=${topic.id})}"
                                   class="btn btn-sm btn-outline-danger d-inline-flex align-items-center"
                                   title="Delete"
                                   onclick="return confirm('Are you sure you want to delete this topic?')">
                                    <i class="bi bi-trash-fill me-1"></i> Delete
                                </a>
                            </div>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(topics)}">
                        <td colspan="7" class="text-center text-muted py-4">No topics found.</td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
