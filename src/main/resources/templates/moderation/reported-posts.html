<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Reported Posts</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <style>
        body{
            background:#f5f7fb;
        }

        .sidebar{
            min-height:100vh;
            background:#212529;
        }

        .sidebar .nav-link{
            color:#ced4da;
            padding:14px 20px;
            margin:5px 10px;
            border-radius:8px;
        }

        .sidebar .nav-link:hover{
            background:#343a40;
            color:white;
        }

        .sidebar .active{
            background:#0d6efd;
            color:white;
        }
    </style>

</head>

<body>

<div th:replace="~{fragments/nav :: nav}"></div>

<div class="container-fluid">

    <div class="row">

        <div class="col-md-2 sidebar p-0">

            <div class="text-center text-white py-4 border-bottom">
                <h3>Moderator</h3>
            </div>

            <a th:href="@{/moderation/dashboard}" class="nav-link">
                🏠 Dashboard
            </a>

            <a th:href="@{/moderation/reports}" class="nav-link active">
                🚨 Reported Posts
            </a>

            <a th:href="@{/moderation/posts}" class="nav-link">
                📌 Post List
            </a>

        </div>

        <div class="col-md-10">

            <div class="p-4">

                <h2>Reported Posts</h2>

                <div class="card shadow-sm mt-3">

                    <div class="table-responsive">

                        <table class="table table-hover align-middle">

                            <thead class="table-dark">

                            <tr>

                                <th>ID</th>

                                <th>Post</th>

                                <th>Reporter</th>

                                <th>Reason</th>

                                <th>Status</th>

                                <th width="280">Action</th>

                            </tr>

                            </thead>

                            <tbody>

                            <tr th:each="report : ${reports}">

                                <td th:text="${report.id}"></td>

                                <td th:text="${report.post.title}"></td>

                                <td th:text="${report.reporter.username}"></td>

                                <td th:text="${report.reason}"></td>

                                <td>

<span class="badge bg-warning"
      th:text="${report.statusReport}">
</span>

                                </td>

                                <td>

                                    <a class="btn btn-sm btn-primary"
                                       th:href="@{/moderation/reports/{id}(id=${report.id})}">
                                        View
                                    </a>

                                    <form class="d-inline"
                                          method="post"
                                          th:action="@{/moderation/reports/{id}/resolve(id=${report.id})}">

                                        <button class="btn btn-sm btn-danger">

                                            Hide

                                        </button>

                                    </form>

                                </td>

                            </tr>

                            </tbody>

                        </table>

                    </div>

                </div>

            </div>

        </div>

    </div>

</div>

</body>
</html>
